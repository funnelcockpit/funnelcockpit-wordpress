name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: PHP Lint
        run: find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' -not -path './build/*' -print0 | xargs -0 -n1 php -l

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-lock

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check PHP compatibility
        run: composer run lint:phpcompat

      - name: Run WordPress VIP PHPCS inspection
        continue-on-error: true
        run: composer run lint:vip

      - name: Verify release package
        run: |
          mkdir -p build/funnelcockpit
          rsync -a --exclude=.git --exclude=.github --exclude=build --exclude=vendor --exclude=node_modules --exclude=deploy ./ build/funnelcockpit/
          test -f build/funnelcockpit/funnelcockpit.php
          test -f build/funnelcockpit/README.txt
          cd build
          zip -qr funnelcockpit.zip funnelcockpit
          unzip -tq funnelcockpit.zip

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Deploy to WordPress.org
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_REPOSITORY: https://plugins.svn.wordpress.org/funnelcockpit
        run: ./deploy/deploy.sh
